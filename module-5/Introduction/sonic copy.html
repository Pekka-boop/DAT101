<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Sonic Example</title>
    <style>
      .prevent-select {
        -webkit-user-select: none; /* Safari */
        -ms-user-select: none; /* IE 10 and IE 11 */
        user-select: none; /* Standard syntax */
      }
    </style>
    <!-- Import map: map the bare specifier "three" to the local module build. -->
    <script type="importmap">
      {
        "imports": {
          "libSprite": "../../common/script/libSprite.mjs",
          "lib2d": "../../common/script/lib2d.mjs"
        }
      }
    </script>
  </head>
  <body class="prevent-select">
    <canvas id="cvs" style="background-color: antiquewhite" width="1024" height="512"></canvas>
  </body>
  <script type="module" defer>
    // Import libraries
    import { TSpriteCanvas, TSprite } from "libSprite";

 // prettier-ignore
  const SpriteInfoList = {
    sonic1: { x: 0, y:   0, width: 102, height: 125, count: 6},
    sonic2: { x: 0, y: 125, width: 102, height: 125, count: 9},
    sonic3: { x: 0, y: 250, width: 102, height: 125, count: 9},
    sonic4: { x: 0, y: 375, width: 102, height:  75, count: 7},
    sonic5: { x: 0, y: 450, width: 100, height: 130, count: 5},
    sonic6: { x: 0, y: 575, width: 102, height: 125, count: 3},
    sonic7: { x: 0, y: 700, width: 102, height: 125, count: 2},
    sonic8: { x: 0, y: 825, width: 102, height: 125, count: 2},
    sonic9: { x: 0, y: 950, width: 102, height: 125, count: 4}
  }

    // Global variables
    const cvs = document.getElementById("cvs");
    const ctx = cvs.getContext("2d");
    const spcvs = new TSpriteCanvas(cvs);
    const hero1 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 100);
    const hero2 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 150);
    const hero3 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 200);
    const hero4 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 250);
    const hero5 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 50);
    const hero6 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 0);
    const hero7 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 300);
    const hero8 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 350);
    const hero9 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 400);
    const hero10 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, 450);
    const hero11 = new TSprite(spcvs, SpriteInfoList.sonic4, 0, -50);
    const hero12 = new TSprite(spcvs, SpriteInfoList.sonic4, 100, 100)

    // Functions
    function drawCanvas(){
      //This is a high performance function
      //Do not do any heavy calculation here
      hero1.draw();
      hero2.draw();
      hero3.draw();
      hero4.draw();
      hero5.draw();
      hero6.draw();
      hero7.draw();
      hero8.draw();
      hero9.draw();
      hero10.draw();
      hero11.draw();
      hero12.draw();
    }

    let dir = 1; //1 = right, -1 = left
    function animate(){
      hero1.x+= 50 * dir;
      hero2.x+= 45 * dir;
      hero3.x+= 40 * dir;
      hero4.x+= 35 * dir;
      hero5.x+= 30 * dir;
      hero6.x+= 25 * dir;
      hero7.x+= 20 * dir;
      hero8.x+= 15 * dir;
      hero9.x+= 10 * dir;
      hero10.x+= 5 * dir;
      hero11.x+= 55 * dir;
      if((hero1.x > cvs.width - hero1.width) || (hero1.x + hero1.width < 0 && dir < 0)){
        dir *= -1;
        hero1.flipHorizontal ();
        
      }
    }

    function sheetLoaded(){
      console.log("Sheet loaded");
      spcvs.showFramerate = true;
      spcvs.onDraw = drawCanvas;
      hero1.animationSpeed = 24;
      hero2.animationSpeed = 24;
      hero3.animationSpeed = 24;
      hero4.animationSpeed = 24;
      hero5.animationSpeed = 24;
      hero6.animationSpeed = 24;
      hero7.animationSpeed = 24;
      hero8.animationSpeed = 24;
      hero9.animationSpeed = 24;
      hero10.animationSpeed = 24;
      hero11.animationSpeed = 24;
      hero12.animationSpeed = 15
      hero1.rotation = 0

      //Start animation
      setInterval(animate, 20)
    }

    function onKeyDown (aEvent){
      switch(aEvent.code){
        case "ArrowUp":
          hero12.y -= 50;
          break;
        case "ArrowRight":
          hero12.x += 50;
          break;
        case "ArrowDown":
          hero12.y += 50;
          break;
        case "ArrowLeft":
          hero12.x -= 50;
          break;
      }
    }

    // Main application
    spcvs.loadSpriteImage("sonic_sprite_sheet.png", sheetLoaded);
    document.addEventListener("keydown", onKeyDown);

  </script>
</html>
